# Worked `semantics:` block for the spark scene
# (assets/pcba_main_s_detail.usd via configs/pcba/spark_pcba_target.yaml).
#
# This file IS NOT loaded automatically — it's a template the skill copies
# into a working configs/sdg/day0_image.yaml when the user is rendering
# the spark board, or a starting point users edit when authoring rules
# for a different scene.
#
# Glob: `**` = any chars (incl. /); `*` = within one segment; `?` = single char.
# Same key in later rule overwrites; different keys merge.

