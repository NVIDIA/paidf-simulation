pipeline_type: missing

# ─── Run controls ──────────────────────────────────────────────────────────
# `missing` writes 2 frames per cell (reference + defective) — max_image_count counts both.
seed: 0
random_seed: 0
max_image_count: -1
num_triggers: 1

# ─── Output ────────────────────────────────────────────────────────────────
output: ${PAIDF_SIM_ROOT}/sdg_test_output/flow2_missing_image

# ─── Render ────────────────────────────────────────────────────────────────
resolution: [1920, 1080]

# ─── PathTracing ───────────────────────────────────────────────────────────
# Additional knobs (adaptive sampling, denoiser, aa_op, …) — see Omniverse RTX docs.
pathtracing:
  spp: 1
  total_spp: 32
  max_bounces: 4

# ─── Scan Grid ─────────────────────────────────────────────────────────────
scan_grid:
  x_num: 10
  y_num: 10

# ─── Missing Defect ────────────────────────────────────────────────────────
missing:
  ratio: 0.5                      # fraction of component pool to hide per trigger

# ─── Top-level material / lighting flags ─────────────────────────────────
vantablack_components: false
use_scene_lights: true
preserve_scene_light_color: true

# ─── Lighting Randomization ────────────────────────────────────────────────
lighting:
  ring_light: false
  exposure_range: [0.01, 1.0]
  cone_angle_range: [90, 150]
  cone_softness_range: [0.5, 1.0]

  layers:
    Inner_Red:
      intensity: [5000, 8000]
      color_r: [0.95, 1.0]
      color_g: [0.0,  0.05]
      color_b: [0.0,  0.05]
    Middle_Green:
      intensity: [2000, 4000]
      color_r: [0.0,  0.05]
      color_g: [0.95, 1.0]
      color_b: [0.0,  0.05]
    Outer_Blue:
      intensity: [3000, 6000]
      color_r: [0.0,  0.05]
      color_g: [0.0,  0.05]
      color_b: [0.95, 1.0]

  white_light:
    intensity: [160, 440]    # 20% of dome-calibrated baseline (post-MR-!10)
    color_r:   [0.8,  1.0]
    color_g:   [0.8,  1.0]
    color_b:   [0.8,  1.0]

# ─── Camera Randomization ──────────────────────────────────────────────────
camera_rotation:
  x_range: [-5, 5]
  y_range: [-5, 5]
  z_fixed: -90

# ─── Augmentation ──────────────────────────────────────────────────────────
augmentation:
  motion_blur:
    probability: 0.8
    alpha_range: [0.01, 0.3]
    kernel_choices: [5, 7]

# ─── Writer (two-pass) ─────────────────────────────────────────────────────
writer:
  reference:                      # Pass 1 — all visible
    rgb: false
    image_output_format: png
    semantic_segmentation: true
    colorize_semantic_segmentation: true
    instance_id_segmentation: false
    bounding_box_2d_tight: true
    bounding_box_2d_loose: false
    bounding_box_3d: false
    distance_to_camera: false
    distance_to_image_plane: false
    semantic_types: [class, defect]
    frame_padding: 4

  defective:                      # Pass 2 — components hidden
    rgb: true
    image_output_format: png
    semantic_segmentation: false
    instance_id_segmentation: false
    bounding_box_2d_tight: false
    bounding_box_2d_loose: false
    bounding_box_3d: false
    distance_to_camera: false
    distance_to_image_plane: false
    frame_padding: 4

# ─── Crop (skill-consumed) ─────────────────────────────────────────────────
# Read by /simulation, not by sdg_pipeline.py. The missing flow is
# two-pass: bbox/seg come from the reference/ subdir, rgb from defective/.
# The skill emits a crop_components.py invocation with --input + --reference
# pointing at the two trigger subdirs, producing missing/ + ok/ buckets.
crop:
  enabled: true
  mode: missing
  types: [rgb, semantic_segmentation, component_instance]
  offset: 10
  input_subdir: defective
  reference_subdir: reference
