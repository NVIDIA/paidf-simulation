# Lighting variant: scene_lights (use_scene_lights: true, ring_light: false).
# See lighting_example/README.md for the full variant matrix.

pipeline_type: good

use_scene_lights: true

# ─── Run controls ──────────────────────────────────────────────────────────
seed: 0
random_seed: 0
max_image_count: -1
num_triggers: 1

# ─── Output ────────────────────────────────────────────────────────────────
output: ${PAIDF_SIM_ROOT}/sdg_test_output/lighting_scene_lights

# ─── Render ────────────────────────────────────────────────────────────────
resolution: [1920, 1080]

# ─── PathTracing ───────────────────────────────────────────────────────────
# Additional knobs (adaptive sampling, denoiser, aa_op, …) — see Omniverse RTX docs.
pathtracing:
  spp: 1
  total_spp: 32
  max_bounces: 4

# ─── Scan Grid (auto-mode: cells per axis, positions from PCBA bbox) ──────
scan_grid:
  x_num: 10
  y_num: 10

# ─── Lighting Randomization ────────────────────────────────────────────────
lighting:
  ring_light: false
  exposure_range: [0.01, 1.0]
  cone_angle_range: [90, 150]
  cone_softness_range: [0.5, 1.0]

  layers:                         # used when ring_light: true
    Inner_Red:
      intensity: [5000, 8000]
      color_r: [0.95, 1.0]
      color_g: [0.0,  0.05]
      color_b: [0.0,  0.05]
    Middle_Green:
      intensity: [2000, 4000]
      color_r: [0.0,  0.05]
      color_g: [0.95, 1.0]
      color_b: [0.0,  0.05]
    Outer_Blue:
      intensity: [3000, 6000]
      color_r: [0.0,  0.05]
      color_g: [0.0,  0.05]
      color_b: [0.95, 1.0]

  white_light:                    # used when ring_light: false
    intensity: [160, 440]    # 20% of dome-calibrated baseline (post-MR-!10)
    color_r:   [0.8,  1.0]
    color_g:   [0.8,  1.0]
    color_b:   [0.8,  1.0]

# ─── Camera Randomization ──────────────────────────────────────────────────
camera_rotation:
  x_range: [0, 0]
  y_range: [0, 0]
  z_fixed: -90

# ─── Augmentation ──────────────────────────────────────────────────────────
augmentation:
  motion_blur:
    probability: 0.8
    alpha_range: [0.01, 0.3]
    kernel_choices: [5, 7]

# ─── Writer ────────────────────────────────────────────────────────────────
writer:
  rgb: true
  image_output_format: png
  bounding_box_2d_tight: true
  bounding_box_2d_loose: false
  bounding_box_3d: false
  semantic_segmentation: true
  instance_id_segmentation: false
  colorize_semantic_segmentation: true
  colorize_instance_id_segmentation: false
  distance_to_camera: false
  distance_to_image_plane: false
  colorize_depth: false

  semantic_types: [class]

  frame_padding: 4

# ─── Crop (skill-consumed) ─────────────────────────────────────────────────
# Read by /simulation, not by sdg_pipeline.py. Disabled here: lighting
# variants render the full PCB for visual QA; per-component crops add no
# signal. Re-enable by overriding `crop.enabled: true` if needed.
crop:
  enabled: false
