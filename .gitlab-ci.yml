include:
  - component: $CI_SERVER_FQDN/security/devops-tools/ci-cd-components/sonarqube/sonarqube-scan@2.0.1
    inputs:
      stage: security
      nspect_id: NSPECT-OS84-33VF
      sonar_project_key: "TEGRASW_Metropolis-perf_SDG_pseudo-labeling"
      sonar_project_name: "TEGRASW_Metropolis-perf_SDG_pseudo-labeling"
      sonar_project_version: "${CI_COMMIT_SHORT_SHA}"
      sonar_source_code_language: python
      allow_failure: true
      vault_role: ""
      rules:
        - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
        - if: $CI_COMMIT_BRANCH == 'main'
        - if: $CI_COMMIT_BRANCH == 'master'
        - if: $CI_COMMIT_BRANCH == 'develop'

  - ref: main
    file: /.gitlab/nvcarps-upstream-ci.yml
    project: nvcarps/ci-group/nvcarps-ci
variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  SONAR_PROJECT_KEY: "TEGRASW_Metropolis-perf_SDG_pcb-aoi"
  GIT_DEPTH: "0"
  # CI dev image destination. DEV_REGISTRY_BASE is defined as a
  # project-level CI/CD variable so the NGC org/team are not hardcoded
  # in the repo. Promotion from this internal location to the external
  # PAI-data-factory/paidf-dev org is handled by the artifacts-promotion
  # pipeline.
  DEV_IMAGE: "${DEV_REGISTRY_BASE}/paidf-simulation"

  NVCARPS_CI_TRIGGER_BRANCH: "main"
  NVCARPS_CI_UPSTREAM_PROFILE: "external"
  NVCARPS_CI_AUTO_SIGN: "true"
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TITLE =~ /^(\[Draft\]|\(Draft\)|Draft:)/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "main-pipeline"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

stages:
  - security
  - build
  - nvcarps
  - nvskills-pipeline

# ---------------------------------------------------------------------------
# Docker image build + push to NGC
#
# Runs on project runners tagged pcb-aoi + docker + linux (assigned in GitLab).
# Uses the host Docker socket mounted by the runner (no DinD).
# On main / main-pipeline: builds and pushes to NGC.
# On MRs: manual job to validate the Dockerfile.
# ---------------------------------------------------------------------------
docker-build-push:
  stage: build
  image: docker:27
  interruptible: true
  tags:
    - pcb-aoi
    - docker
    - linux
  timeout: 1 hour
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  before_script:
    - docker info
    - echo "$NGC_STAGING_API_KEY" | docker login nvcr.io -u "\$oauthtoken" --password-stdin
    - docker pull ${BASE_IMAGE:-nvcr.io/nvidia/isaac-sim:6.0.0-dev3}
    - echo "$METRO_PERF_NGC_API_KEY" | docker login nvcr.io -u "\$oauthtoken" --password-stdin
  script:
    - |
      if [ -z "$METRO_PERF_NGC_API_KEY" ]; then
        echo "Error: METRO_PERF_NGC_API_KEY environment variable is not set"
        exit 1
      fi

      VERSION=$(awk -F' *= *' '/^version *=/ {gsub(/"/, "", $2); print $2; exit}' pyproject.toml)
      if [ -z "$VERSION" ]; then
        echo "Error: Could not extract version from pyproject.toml"
        exit 1
      fi

      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        LABEL="mr$CI_MERGE_REQUEST_IID"
      else
        LABEL="main"
      fi

      IMAGE_TAG="$VERSION-$CI_COMMIT_SHORT_SHA.$LABEL"

      docker pull $DEV_IMAGE:cache || true
      docker build \
        --cache-from $DEV_IMAGE:cache \
        -f Dockerfile \
        -t $DEV_IMAGE:$IMAGE_TAG \
        -t $DEV_IMAGE:cache \
        -t $DEV_IMAGE:sqa \
        .

      docker push $DEV_IMAGE:$IMAGE_TAG
      docker push $DEV_IMAGE:cache
      docker push $DEV_IMAGE:sqa
      echo "Image pushed to $DEV_IMAGE:$IMAGE_TAG (and rolling tag $DEV_IMAGE:sqa)"

      docker rmi $DEV_IMAGE:$IMAGE_TAG
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_COMMIT_BRANCH == 'main-pipeline'
